name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: '1.24'
  NODE_VERSION: '22'

jobs:
  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run go vet
        run: go vet ./...
        env:
          CGO_ENABLED: '0'
      - name: Run Go tests
        run: go test ./... -timeout 300s -count=1
        env:
          CGO_ENABLED: '0'

  test-go-race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run Go tests with race detector
        run: go test -race -short -timeout 300s -count=1 ./...
        env:
          CGO_ENABLED: '1'

  build-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        working-directory: cmd/deepdata/web-ui
        run: npm ci
      - name: Build web UI
        working-directory: cmd/deepdata/web-ui
        run: npm run build
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-ui-dist
          path: cmd/deepdata/web-ui/dist/
          retention-days: 1

  test-ui:
    needs: build-ui
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Download web UI dist
        uses: actions/download-artifact@v4
        with:
          name: web-ui-dist
          path: cmd/deepdata/web-ui/dist/
      - name: Build Go binary for tests
        run: go build -o tests/ui/deepdata-test ./cmd/deepdata/
        env:
          CGO_ENABLED: '0'
      - name: Install Playwright
        working-directory: tests/ui
        run: npm ci && npx playwright install --with-deps chromium
      - name: Run Playwright tests
        working-directory: tests/ui
        run: npx playwright test
        env:
          DEEPDATA_BIN: ./deepdata-test
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/ui/playwright-report/
          retention-days: 7

  cross-compile-server:
    needs: build-ui
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: .exe
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Download web UI dist
        uses: actions/download-artifact@v4
        with:
          name: web-ui-dist
          path: cmd/deepdata/web-ui/dist/
      - name: Build
        run: go build -ldflags="-s -w" -o bin/deepdata-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/deepdata/
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: deepdata-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/deepdata-*

  desktop-build:
    needs: build-ui
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
          - os: macos-latest
            target: macos
          - os: windows-latest
            target: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Download web UI dist
        uses: actions/download-artifact@v4
        with:
          name: web-ui-dist
          path: cmd/deepdata/web-ui/dist/

      - name: Build Go sidecar (Linux)
        if: matrix.target == 'linux'
        run: |
          CGO_ENABLED=0 go build -ldflags="-s -w" -o desktop/src-tauri/binaries/deepdata-x86_64-unknown-linux-gnu ./cmd/deepdata/

      - name: Build Go sidecar (macOS)
        if: matrix.target == 'macos'
        run: |
          CGO_ENABLED=0 GOARCH=arm64 go build -ldflags="-s -w" -o desktop/src-tauri/binaries/deepdata-aarch64-apple-darwin ./cmd/deepdata/
          CGO_ENABLED=0 GOARCH=amd64 go build -ldflags="-s -w" -o desktop/src-tauri/binaries/deepdata-x86_64-apple-darwin ./cmd/deepdata/

      - name: Import Apple signing certificate
        if: matrix.target == 'macos' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$APPLE_KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$APPLE_KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$APPLE_KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12

      - name: Build Go sidecar (Windows)
        if: matrix.target == 'windows'
        shell: bash
        run: |
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o desktop/src-tauri/binaries/deepdata-x86_64-pc-windows-msvc.exe ./cmd/deepdata/

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Ad-hoc sign sidecar (macOS, no certificate)
        if: matrix.target == 'macos' && env.APPLE_CERTIFICATE == ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        run: |
          for bin in desktop/src-tauri/binaries/deepdata-*-apple-darwin; do
            codesign --force --sign - --entitlements desktop/src-tauri/entitlements.plist "$bin"
          done

      - name: Build desktop app
        working-directory: desktop
        run: cargo tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ''
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY || '-' }}

      - name: Ad-hoc sign app bundle (macOS, no certificate)
        if: matrix.target == 'macos' && env.APPLE_CERTIFICATE == ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        run: |
          APP_BUNDLE=$(find desktop/src-tauri/target/release/bundle -name "*.app" -maxdepth 3 | head -1)
          if [ -n "$APP_BUNDLE" ]; then
            codesign --force --deep --sign - --entitlements desktop/src-tauri/entitlements.plist "$APP_BUNDLE"
          fi

      - name: Notarize (macOS, with certificate)
        if: matrix.target == 'macos' && env.APPLE_ID != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG=$(find desktop/src-tauri/target/release/bundle/dmg -name "*.dmg" | head -1)
          if [ -n "$DMG" ]; then
            xcrun notarytool submit "$DMG" --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
            xcrun stapler staple "$DMG"
          fi

      - name: Upload desktop bundle
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.target }}
          path: |
            desktop/src-tauri/target/release/bundle/deb/*.deb
            desktop/src-tauri/target/release/bundle/rpm/*.rpm
            desktop/src-tauri/target/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: ignore
          retention-days: 7
