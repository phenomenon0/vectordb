name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: '1.24'
  NODE_VERSION: '22'

jobs:
  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run Go tests
        run: go test ./... -timeout 300s -count=1
        env:
          CGO_ENABLED: '0'

  build-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        working-directory: cmd/deepdata/web-ui
        run: npm ci
      - name: Build web UI
        working-directory: cmd/deepdata/web-ui
        run: npm run build
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-ui-dist
          path: cmd/deepdata/web-ui/dist/
          retention-days: 1

  test-ui:
    needs: build-ui
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Download web UI dist
        uses: actions/download-artifact@v4
        with:
          name: web-ui-dist
          path: cmd/deepdata/web-ui/dist/
      - name: Build Go binary for tests
        run: go build -o tests/ui/deepdata-test ./cmd/deepdata/
        env:
          CGO_ENABLED: '0'
      - name: Install Playwright
        working-directory: tests/ui
        run: npm ci && npx playwright install --with-deps chromium
      - name: Run Playwright tests
        working-directory: tests/ui
        run: npx playwright test
        env:
          DEEPDATA_BIN: ./deepdata-test
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/ui/playwright-report/
          retention-days: 7

  cross-compile-server:
    needs: build-ui
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: .exe
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Download web UI dist
        uses: actions/download-artifact@v4
        with:
          name: web-ui-dist
          path: cmd/deepdata/web-ui/dist/
      - name: Build
        run: go build -ldflags="-s -w" -o bin/deepdata-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/deepdata/
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: deepdata-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/deepdata-*

  desktop-build:
    needs: build-ui
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
          - os: macos-latest
            target: macos
          - os: windows-latest
            target: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Download web UI dist
        uses: actions/download-artifact@v4
        with:
          name: web-ui-dist
          path: cmd/deepdata/web-ui/dist/

      - name: Build Go sidecar (Linux)
        if: matrix.target == 'linux'
        run: |
          CGO_ENABLED=0 go build -ldflags="-s -w" -o desktop/src-tauri/binaries/deepdata-x86_64-unknown-linux-gnu ./cmd/deepdata/

      - name: Build Go sidecar (macOS)
        if: matrix.target == 'macos'
        run: |
          CGO_ENABLED=0 GOARCH=arm64 go build -ldflags="-s -w" -o desktop/src-tauri/binaries/deepdata-aarch64-apple-darwin ./cmd/deepdata/
          CGO_ENABLED=0 GOARCH=amd64 go build -ldflags="-s -w" -o desktop/src-tauri/binaries/deepdata-x86_64-apple-darwin ./cmd/deepdata/

      - name: Build Go sidecar (Windows)
        if: matrix.target == 'windows'
        shell: bash
        run: |
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o desktop/src-tauri/binaries/deepdata-x86_64-pc-windows-msvc.exe ./cmd/deepdata/

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Build desktop app
        working-directory: desktop
        run: cargo tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ''

      - name: Upload desktop bundle
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.target }}
          path: |
            desktop/src-tauri/target/release/bundle/deb/*.deb
            desktop/src-tauri/target/release/bundle/rpm/*.rpm
            desktop/src-tauri/target/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: ignore
          retention-days: 7
