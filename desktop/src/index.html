<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepData</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --fg: #d4d4d4;
      --fg-dim: #525252;
      --accent: #3b82f6;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Space Grotesk', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .splash {
      text-align: center;
    }
    .splash h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }
    .splash p {
      color: var(--fg-dim);
      font-size: 13px;
    }
    .spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 2px solid var(--fg-dim);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="splash">
    <div class="spinner"></div>
    <h1>DeepData</h1>
    <p>Connecting to server...</p>
  </div>
  <script>
    // The Tauri app navigates to the Go-served web UI once the sidecar is ready.
    // This splash is only visible for 1-2 seconds during startup.
    async function waitForServer() {
      const base = 'http://127.0.0.1:8080';
      for (let i = 0; i < 60; i++) {
        try {
          const r = await fetch(base + '/health', { signal: AbortSignal.timeout(1000) });
          if (r.ok) {
            window.location.href = base + '/dashboard/';
            return;
          }
        } catch (_) {}
        await new Promise(resolve => setTimeout(resolve, 500));
      }
      document.querySelector('.splash p').textContent = 'Could not connect to DeepData server.';
    }
    waitForServer();
  </script>
</body>
</html>
