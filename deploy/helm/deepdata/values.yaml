# Default values for DeepData vector database

replicaCount: 1

image:
  repository: deepdata
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

# Environment-based configuration
config:
  port: 8080
  mode: local
  logFormat: json
  useHashEmbedder: "1"
  vectorCapacity: "1000"
  hydrationCount: "0"
  apiRps: "100"
  # HNSW tuning
  # hnswM: "16"
  # hnswEfSearch: "200"

# Authentication (leave empty to disable)
auth:
  apiToken: ""
  jwtSecret: ""
  requireAuth: false

# OpenTelemetry tracing
telemetry:
  enabled: false
  endpoint: ""
  serviceName: deepdata

# Persistence for WAL + index files
persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 5Gi

resources:
  limits:
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}

# Liveness and readiness probes
probes:
  liveness:
    path: /healthz
    initialDelaySeconds: 5
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
