apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-deepdata
  labels:
    app.kubernetes.io/name: deepdata
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: deepdata
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: deepdata
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: deepdata
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.config.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.config.port | quote }}
            - name: VECTORDB_BASE_DIR
              value: /data
            - name: VECTORDB_MODE
              value: {{ .Values.config.mode | quote }}
            - name: LOG_FORMAT
              value: {{ .Values.config.logFormat | quote }}
            - name: USE_HASH_EMBEDDER
              value: {{ .Values.config.useHashEmbedder | quote }}
            - name: VECTOR_CAPACITY
              value: {{ .Values.config.vectorCapacity | quote }}
            - name: HYDRATION_COUNT
              value: {{ .Values.config.hydrationCount | quote }}
            - name: API_RPS
              value: {{ .Values.config.apiRps | quote }}
            {{- if .Values.auth.apiToken }}
            - name: API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-deepdata-auth
                  key: api-token
            {{- end }}
            {{- if .Values.auth.jwtSecret }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-deepdata-auth
                  key: jwt-secret
            {{- end }}
            {{- if .Values.auth.requireAuth }}
            - name: REQUIRE_AUTH
              value: "1"
            {{- end }}
            {{- if .Values.telemetry.enabled }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.telemetry.endpoint | quote }}
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.telemetry.serviceName | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: /data
            {{- end }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-deepdata-data
        {{- end }}
