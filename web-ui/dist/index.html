<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VectorDB</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --bg2: #141414; --bg3: #1e1e1e;
      --fg: #e5e5e5; --fg2: #a0a0a0; --accent: #3b82f6;
      --green: #22c55e; --red: #ef4444; --border: #2a2a2a;
    }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--fg); min-height: 100vh; }
    .container { max-width: 1200px; margin: 0 auto; padding: 1rem; }
    header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 1rem 0; margin-bottom: 1.5rem; }
    header .container { display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 1.5rem; font-weight: 600; }
    .status { display: flex; align-items: center; gap: 0.5rem; font-size: 0.875rem; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; }
    .status-dot.online { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .status-dot.offline { background: var(--red); }
    .badge { background: var(--bg3); padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; color: var(--fg2); }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 0.5rem; padding: 1rem; }
    .card h2 { font-size: 0.875rem; color: var(--fg2); margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat { font-size: 2rem; font-weight: 700; }
    .stat-label { font-size: 0.75rem; color: var(--fg2); }
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    input, textarea, select, button { font-family: inherit; font-size: 0.875rem; }
    input, textarea, select { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 0.375rem; padding: 0.5rem 0.75rem; color: var(--fg); }
    input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); }
    textarea { resize: vertical; min-height: 80px; }
    button { background: var(--accent); color: white; border: none; border-radius: 0.375rem; padding: 0.5rem 1rem; cursor: pointer; font-weight: 500; }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.secondary { background: var(--bg3); }
    .form-group { margin-bottom: 0.75rem; }
    .form-group label { display: block; font-size: 0.75rem; color: var(--fg2); margin-bottom: 0.25rem; }
    .collections { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .collection { background: var(--bg3); padding: 0.5rem 0.75rem; border-radius: 0.375rem; font-size: 0.875rem; cursor: pointer; border: 1px solid transparent; }
    .collection:hover { border-color: var(--border); }
    .collection.active { border-color: var(--accent); background: rgba(59,130,246,0.1); }
    .collection-count { color: var(--fg2); font-size: 0.75rem; margin-left: 0.5rem; }
    .results { margin-top: 1rem; }
    .result { background: var(--bg); border: 1px solid var(--border); border-radius: 0.375rem; padding: 0.75rem; margin-bottom: 0.5rem; }
    .result-score { font-size: 0.75rem; color: var(--accent); margin-bottom: 0.25rem; }
    .result-text { font-size: 0.875rem; line-height: 1.5; }
    .result-meta { font-size: 0.75rem; color: var(--fg2); margin-top: 0.5rem; }
    .empty { text-align: center; color: var(--fg2); padding: 2rem; }
    .toast { position: fixed; bottom: 1rem; right: 1rem; background: var(--bg2); border: 1px solid var(--border); padding: 0.75rem 1rem; border-radius: 0.375rem; font-size: 0.875rem; z-index: 1000; animation: slideIn 0.2s; }
    .toast.success { border-color: var(--green); }
    .toast.error { border-color: var(--red); }
    @keyframes slideIn { from { transform: translateY(1rem); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .info-row { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid var(--border); font-size: 0.875rem; }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: var(--fg2); }
    .flex { display: flex; gap: 0.5rem; }
    .mt { margin-top: 1rem; }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1>VectorDB</h1>
      <div class="status">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Connecting...</span>
        <span class="badge" id="modeBadge">-</span>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="stats-grid">
      <div class="card">
        <div class="stat" id="totalVectors">-</div>
        <div class="stat-label">Total Vectors</div>
      </div>
      <div class="card">
        <div class="stat" id="totalCollections">-</div>
        <div class="stat-label">Collections</div>
      </div>
      <div class="card">
        <div class="stat" id="dimension">-</div>
        <div class="stat-label">Dimensions</div>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <h2>Search</h2>
        <div class="form-group">
          <label>Query</label>
          <input type="text" id="searchQuery" placeholder="Enter search query..." />
        </div>
        <div class="form-group">
          <label>Collection</label>
          <select id="searchCollection"></select>
        </div>
        <div class="flex">
          <button onclick="doSearch()">Search</button>
          <input type="number" id="searchK" value="5" min="1" max="100" style="width: 60px" title="Number of results" />
        </div>
        <div class="results" id="searchResults">
          <div class="empty">Enter a query to search</div>
        </div>
      </div>

      <div class="card">
        <h2>Insert Document</h2>
        <div class="form-group">
          <label>Text</label>
          <textarea id="insertText" placeholder="Enter document text..."></textarea>
        </div>
        <div class="form-group">
          <label>Collection</label>
          <input type="text" id="insertCollection" placeholder="default" value="default" />
        </div>
        <button onclick="doInsert()">Insert</button>

        <h2 class="mt" style="margin-top: 1.5rem">Collections</h2>
        <div class="collections" id="collectionsList">
          <div class="empty">No collections yet</div>
        </div>
      </div>
    </div>

    <div class="card mt">
      <h2>System Info</h2>
      <div id="systemInfo">
        <div class="info-row"><span class="info-label">Embedder</span><span id="infoEmbedder">-</span></div>
        <div class="info-row"><span class="info-label">Model</span><span id="infoModel">-</span></div>
        <div class="info-row"><span class="info-label">Index Type</span><span id="infoIndex">HNSW</span></div>
      </div>
    </div>
  </main>

  <script>
    const API = window.location.origin;
    let collections = [];

    async function fetchHealth() {
      try {
        const res = await fetch(`${API}/health`);
        const data = await res.json();
        document.getElementById('statusDot').className = 'status-dot online';
        document.getElementById('statusText').textContent = 'Online';
        document.getElementById('totalVectors').textContent = data.total?.toLocaleString() ?? data.count?.toLocaleString() ?? '0';
        document.getElementById('dimension').textContent = data.mode?.dimension ?? data.dim ?? '-';
        if (data.mode) {
          document.getElementById('modeBadge').textContent = (data.mode.mode ?? 'LOCAL').toUpperCase();
          document.getElementById('infoModel').textContent = data.mode.embedder_model ?? '-';
        }
        if (data.embedder) {
          document.getElementById('infoEmbedder').textContent = data.embedder.type ?? '-';
        }
        // Get collections from health endpoint
        if (data.collections) {
          collections = data.collections;
          renderCollections();
          updateCollectionSelect();
          document.getElementById('totalCollections').textContent = collections.length;
        }
      } catch (e) {
        document.getElementById('statusDot').className = 'status-dot offline';
        document.getElementById('statusText').textContent = 'Offline';
      }
    }

    async function fetchCollections() {
      // Collections are now fetched from /health endpoint
      // This function is kept for manual refresh if needed
    }

    function renderCollections() {
      const container = document.getElementById('collectionsList');
      if (collections.length === 0) {
        container.innerHTML = '<div class="empty">No collections yet</div>';
        return;
      }
      container.innerHTML = collections.map(c => 
        `<div class="collection" onclick="selectCollection('${c.name}')">${c.name}<span class="collection-count">${c.vector_count ?? 0}</span></div>`
      ).join('');
    }

    function updateCollectionSelect() {
      const select = document.getElementById('searchCollection');
      select.innerHTML = '<option value="">All collections</option>' + 
        collections.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
    }

    function selectCollection(name) {
      document.getElementById('searchCollection').value = name;
      document.getElementById('insertCollection').value = name;
    }

    async function doSearch() {
      const query = document.getElementById('searchQuery').value.trim();
      if (!query) return showToast('Enter a search query', 'error');
      
      const collection = document.getElementById('searchCollection').value;
      const k = parseInt(document.getElementById('searchK').value) || 5;
      const resultsDiv = document.getElementById('searchResults');
      resultsDiv.innerHTML = '<div class="empty">Searching...</div>';

      try {
        const body = { query: query, top_k: k };
        if (collection) body.collection = collection;
        
        const res = await fetch(`${API}/query`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        
        // Handle both formats: {docs, ids, scores} and {results}
        const docs = data.docs || data.results?.map(r => r.doc || r.text) || [];
        const scores = data.scores || data.results?.map(r => r.score) || [];
        const ids = data.ids || data.results?.map(r => r.id) || [];
        
        if (docs.length === 0) {
          resultsDiv.innerHTML = '<div class="empty">No results found</div>';
          return;
        }
        
        resultsDiv.innerHTML = docs.map((doc, i) => `
          <div class="result">
            <div class="result-score">#${i+1} Score: ${(scores[i] ?? 0).toFixed(4)}</div>
            <div class="result-text">${escapeHtml(doc || '-')}</div>
            <div class="result-meta">ID: ${ids[i] || '-'}</div>
          </div>
        `).join('');
      } catch (e) {
        resultsDiv.innerHTML = `<div class="empty" style="color: var(--red)">Error: ${e.message}</div>`;
      }
    }

    async function doInsert() {
      const text = document.getElementById('insertText').value.trim();
      if (!text) return showToast('Enter document text', 'error');
      
      const collection = document.getElementById('insertCollection').value || 'default';

      try {
        const res = await fetch(`${API}/insert`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ doc: text, collection })
        });
        const data = await res.json();
        
        if (data.id || data.ok) {
          showToast('Document inserted successfully', 'success');
          document.getElementById('insertText').value = '';
          fetchHealth();
          fetchCollections();
        } else {
          showToast(data.error || 'Insert failed', 'error');
        }
      } catch (e) {
        showToast(`Error: ${e.message}`, 'error');
      }
    }

    function showToast(message, type = 'info') {
      const existing = document.querySelector('.toast');
      if (existing) existing.remove();
      
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Initialize
    fetchHealth();
    fetchCollections();
    setInterval(fetchHealth, 10000);
    setInterval(fetchCollections, 30000);

    // Enter key handlers
    document.getElementById('searchQuery').addEventListener('keypress', e => { if (e.key === 'Enter') doSearch(); });
    document.getElementById('insertText').addEventListener('keypress', e => { if (e.key === 'Enter' && e.ctrlKey) doInsert(); });
  </script>
</body>
</html>
