services:
  vectordb:
    build:
      context: ..
      dockerfile: vectordb/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - vectordb-data:/data
    environment:
      - PORT=8080
      - DATA_DIR=/data
      - LOG_LEVEL=info
      # Uncomment to enable authentication:
      # - JWT_SECRET=your-secret-here
      # - JWT_REQUIRED=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 3s
      start_period: 5s
      retries: 3

volumes:
  vectordb-data:
