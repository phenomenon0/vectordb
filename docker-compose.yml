services:
  deepdata:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${DEEPDATA_PORT:-8080}:8080"
    volumes:
      - deepdata-data:/data
    environment:
      - PORT=8080
      - VECTORDB_BASE_DIR=/data
      - VECTORDB_MODE=local
      - LOG_FORMAT=json
      - USE_HASH_EMBEDDER=1
      - VECTOR_CAPACITY=1000
      - HYDRATION_COUNT=0
      # HNSW tuning (defaults are fine for most cases)
      # - HNSW_M=16
      # - HNSW_EFSEARCH=200
      # Rate limiting
      - API_RPS=100
      # Authentication (uncomment to enable)
      # - API_TOKEN=your-token-here
      # - JWT_SECRET=your-jwt-secret
      # - REQUIRE_AUTH=1
      # OpenTelemetry (uncomment to enable tracing)
      # - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
      # - OTEL_SERVICE_NAME=deepdata
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 15s
      timeout: 3s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

volumes:
  deepdata-data:
