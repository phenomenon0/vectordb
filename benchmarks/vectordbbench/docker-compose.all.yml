# Full competitive benchmark stack: 9 vector databases
# DeepData runs as a native binary (see run_all.sh)
#
# Start:  podman compose -f docker-compose.all.yml up -d
# Stop:   podman compose -f docker-compose.all.yml down -v

services:

  # ── Qdrant ────────────────────────────────────────────────────────
  qdrant:
    image: docker.io/qdrant/qdrant:v1.12.5
    ports:
      - "6333:6333"
      - "6334:6334"
    # mem_limit removed for podman compatibility
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Weaviate ──────────────────────────────────────────────────────
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.28.4
    ports:
      - "8081:8080"
      - "50051:50051"
    environment:
      QUERY_DEFAULTS_LIMIT: 100
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      DEFAULT_VECTORIZER_MODULE: "none"
      CLUSTER_HOSTNAME: "node1"
    # mem_limit removed for podman compatibility
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/.well-known/ready"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Milvus (standalone with etcd + minio) ─────────────────────────
  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    # mem_limit removed for podman compatibility

  minio:
    image: docker.io/minio/minio:RELEASE.2024-11-07T00-52-20Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    # mem_limit removed for podman compatibility
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5

  milvus:
    image: docker.io/milvusdb/milvus:v2.5.4
    ports:
      - "19530:19530"
      - "9091:9091"
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    depends_on:
      etcd:
        condition: service_started
      minio:
        condition: service_healthy
    command: ["milvus", "run", "standalone"]
    # mem_limit removed for podman compatibility
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ── ChromaDB ──────────────────────────────────────────────────────
  chromadb:
    image: docker.io/chromadb/chroma:1.0.12
    ports:
      - "8010:8000"
    environment:
      - ANONYMIZED_TELEMETRY=false
    # mem_limit removed for podman compatibility
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── pgvector (PostgreSQL + vector extension) ──────────────────────
  pgvector:
    image: docker.io/pgvector/pgvector:pg17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: bench
      POSTGRES_PASSWORD: bench
      POSTGRES_DB: vectordb
    # mem_limit removed for podman compatibility
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bench"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Redis Stack (with vector search) ──────────────────────────────
  redis:
    image: docker.io/redis/redis-stack-server:latest
    ports:
      - "6379:6379"
    # mem_limit removed for podman compatibility
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Elasticsearch (with vector search) ────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms2g -Xmx2g
    # mem_limit removed for podman compatibility
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ── LanceDB (embedded, no server needed - runs in-process) ────────
  # LanceDB is tested in-process via Python, no Docker needed

volumes:
  etcd_data:
  minio_data:
